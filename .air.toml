root = "."
tmp_dir = "tmp"

[build]
  entrypoint = "./tmp/main"
  cmd = "go tool sqlc generate && go tool templ generate && make tailwind-build js-build && go build -ldflags=\"-X main.BuildDate=$(date -u +%Y-%m-%d)\" -o ./tmp/main ./cmd/api/main.go"
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "node_modules"]
  exclude_file = ["output.css"]
  exclude_regex = ["_test.go", "_templ.go", ".*\\.min\\.js", "internal/database/db.go", "internal/database/models.go", "internal/database/.*\\.sql\\.go"]
  include_dir = ["internal", "cmd", "frontend/public/styles", "frontend/public/scripts"]
  include_ext = ["go", "templ", "css", "sql", "js"]
  log = "build-errors.log"
  stop_on_error = true

[color]
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true