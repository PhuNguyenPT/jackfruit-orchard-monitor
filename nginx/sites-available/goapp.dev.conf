server {
    listen 8080;
    server_name localhost;
    access_log /var/log/nginx/access.log combined buffer=512k flush=1m;
    error_log /var/log/nginx/error.log warn;
    include /etc/nginx/nginxconfig.io/security.conf;
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;
    client_max_body_size 10M;

    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location = /favicon.ico {
        proxy_pass https://backend_secure;
        proxy_ssl_name watch;
        include /etc/nginx/nginxconfig.io/proxy.conf;
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        proxy_pass https://backend_secure;
        proxy_ssl_name watch;
        include /etc/nginx/nginxconfig.io/proxy.conf;
        log_not_found off;
    }

    location = /sitemap.xml {
        proxy_pass https://backend_secure;
        proxy_ssl_name watch;
        include /etc/nginx/nginxconfig.io/proxy.conf;
        log_not_found off;
    }

    location = /api/websocket {
        proxy_pass https://backend_secure;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_ssl_certificate /run/secrets/nginx_client_crt;
        proxy_ssl_certificate_key /run/secrets/nginx_client_key;
        proxy_ssl_trusted_certificate /run/secrets/backend_ca;
        proxy_ssl_verify on;
        proxy_ssl_server_name on;
        proxy_ssl_name watch;
    }

    location ^~ /api/ {
        proxy_pass https://backend_secure;
        proxy_ssl_name watch;
        include /etc/nginx/nginxconfig.io/proxy.conf;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        proxy_pass https://backend_secure;
        proxy_ssl_name watch;
        include /etc/nginx/nginxconfig.io/proxy.conf;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ^~ /.well-known/ {
        access_log off;
        log_not_found off;
        return 404;
    }

    location = /public/site.webmanifest {
        proxy_pass https://backend_secure;
        proxy_ssl_name watch;
        include /etc/nginx/nginxconfig.io/proxy.conf;
        expires 1d;
        add_header Cache-Control "public";
        access_log off;
    }
    
    location / {
        proxy_pass https://backend_secure;
        proxy_ssl_name watch;
        include /etc/nginx/nginxconfig.io/proxy.conf;
    }
}