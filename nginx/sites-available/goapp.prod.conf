# ==========================================
# 1. Main HTTPS Server: admission-help.org
# ==========================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name admission-help.org;

    # admission-help.org Origin Cert
    ssl_certificate        /etc/ssl/admission-help.org.pem;
    ssl_certificate_key    /etc/ssl/admission-help.org.key;

    # Authenticated Origin Pulls
    ssl_client_certificate /etc/ssl/cloudflare.crt;
    ssl_verify_client      optional;
    ssl_verify_depth       2;

    include /etc/nginx/nginxconfig.io/security.conf;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    access_log /var/log/nginx/access.log combined buffer=512k flush=1m;
    error_log  /var/log/nginx/error.log warn;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;

    client_max_body_size   10M;
    client_body_buffer_size 5M;
    limit_conn addr 15;

    # --- App Locations ---
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location = /api/websocket {
        proxy_pass https://backend_secure;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_ssl_certificate         /run/secrets/nginx_client_crt;
        proxy_ssl_certificate_key     /run/secrets/nginx_client_key;
        proxy_ssl_trusted_certificate /run/secrets/backend_ca;
        proxy_ssl_verify    on;
        proxy_ssl_server_name on;
        proxy_ssl_name app;
    }

    location = /sensors/ws {
        proxy_pass https://backend_secure;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_ssl_certificate         /run/secrets/nginx_client_crt;
        proxy_ssl_certificate_key     /run/secrets/nginx_client_key;
        proxy_ssl_trusted_certificate /run/secrets/backend_ca;
        proxy_ssl_verify    on;
        proxy_ssl_server_name on;
        proxy_ssl_name app;
    }

    location ~* ^/(login|register) {
        limit_req zone=auth_limit burst=10 delay=5;
        limit_req_status 429;
        error_page 429 = @api_429;
        proxy_pass https://backend_secure;
        proxy_ssl_name app;
        include /etc/nginx/nginxconfig.io/proxy.conf;
    }

    location ^~ /api/ {
        limit_req zone=api_general burst=150 nodelay;
        limit_req_status 429;
        error_page 429 = @api_429;
        proxy_pass https://backend_secure;
        proxy_ssl_name app;
        include /etc/nginx/nginxconfig.io/proxy.conf;
    }

    location @api_429 {
        add_header Content-Type application/json always;
        add_header Retry-After 60 always;
        return 429 '{"error":"Too many requests","message":"Rate limit exceeded. Please try again in 60 seconds.","retry_after":60}';
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        limit_req zone=static burst=50 nodelay;
        proxy_pass https://backend_secure;
        proxy_ssl_name app;
        include /etc/nginx/nginxconfig.io/proxy.conf;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location = /favicon.ico {
        proxy_pass https://backend_secure;
        proxy_ssl_name app;
        include /etc/nginx/nginxconfig.io/proxy.conf;
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        proxy_pass https://backend_secure;
        proxy_ssl_name app;
        include /etc/nginx/nginxconfig.io/proxy.conf;
        log_not_found off;
    }

    location ^~ /.well-known/ {
        access_log off;
        log_not_found off;
        return 404;
    }

    location / {
        proxy_pass https://backend_secure;
        proxy_ssl_name app;
        include /etc/nginx/nginxconfig.io/proxy.conf;
    }
}

