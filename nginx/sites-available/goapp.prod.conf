# ==========================================
# 3. HTTPS www → apex Redirects
# ==========================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.admission-help.org;
    ssl_certificate     /etc/ssl/admission-help.org.pem;
    ssl_certificate_key /etc/ssl/admission-help.org.key;
    return 301 https://admission-help.org$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.galaxyfreedom.com;
    ssl_certificate     /etc/ssl/galaxyfreedom.com.cert.pem;
    ssl_certificate_key /etc/ssl/galaxyfreedom.com.key.pem;
    return 301 https://galaxyfreedom.com$request_uri;
}

# ==========================================
# 4. HTTP → HTTPS Global Redirect
# ==========================================
server {
    listen 80;
    listen [::]:80;
    server_name admission-help.org www.admission-help.org galaxyfreedom.com www.galaxyfreedom.com;

    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}