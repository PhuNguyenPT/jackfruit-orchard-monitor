secrets:
  go_crt:
    file: ./secrets/go.crt
  go_key:
    file: ./secrets/go.key
  nginx_client_crt:
    file: ./secrets/nginx-client.crt
  nginx_client_key:
    file: ./secrets/nginx-client.key
  backend_ca:
    file: ./secrets/ca.crt
services:
  nginx-goapp-dev:
    profiles: ["dev"]
    image: nginx:alpine
    restart: unless-stopped
    secrets:
      - nginx_client_crt
      - nginx_client_key
      - backend_ca
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/upstream.dev.conf:/etc/nginx/conf.d/upstream.conf:ro
      - ./nginx/nginxconfig.io/proxy.conf:/etc/nginx/nginxconfig.io/proxy.conf:ro
      - ./nginx/nginxconfig.io/security.goapp.conf:/etc/nginx/nginxconfig.io/security.conf:ro
      - ./nginx/sites-available/goapp.dev.conf:/etc/nginx/sites-enabled/goapp.dev.conf:ro
      - ./nginx/dhparam.pem:/etc/nginx/dhparam.pem:ro
    ports:
      - "8080:8080"
    depends_on:
      psql:
        condition: service_healthy
      watch:
        condition: service_healthy
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  nginx-goapp-prod:
    profiles: ["prod"]
    image: nginx:alpine
    restart: unless-stopped
    secrets:
      - nginx_client_crt
      - nginx_client_key
      - backend_ca
    volumes:
      # SSL certs already on host
      - /etc/ssl/admission-help.org.pem:/etc/ssl/admission-help.org.pem:ro
      - /etc/ssl/admission-help.org.key:/etc/ssl/admission-help.org.key:ro
      - /etc/ssl/galaxyfreedom.com.cert.pem:/etc/ssl/galaxyfreedom.com.cert.pem:ro
      - /etc/ssl/galaxyfreedom.com.key.pem:/etc/ssl/galaxyfreedom.com.key.pem:ro
      - /etc/ssl/cloudflare.crt:/etc/ssl/cloudflare.crt:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # nginx config
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/upstream.prod.conf:/etc/nginx/conf.d/upstream.conf:ro
      - ./nginx/nginxconfig.io/proxy.conf:/etc/nginx/nginxconfig.io/proxy.conf:ro
      - ./nginx/nginxconfig.io/security.goapp.conf:/etc/nginx/nginxconfig.io/security.conf:ro
      - ./nginx/sites-available/goapp.prod.conf:/etc/nginx/sites-enabled/goapp.prod.conf:ro
      - ./nginx/sites-available/mqtt.prod.conf:/etc/nginx/sites-enabled/mqtt.prod.conf:ro
      - ./nginx/dhparam.pem:/etc/nginx/dhparam.pem:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      psql:
        condition: service_healthy
      app:
        condition: service_healthy
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"

  app:
    profiles: ["prod"]
    secrets:
      - go_crt
      - go_key
      - backend_ca
    expose:
      - "8443"
    ports:
      - "8883:8883"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV}
      PORT: ${PORT}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE}
      POSTGRES_USERNAME: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_SCHEMA: ${POSTGRES_SCHEMA}
      TLS_PORT: ${TLS_PORT}
      MQTT_USER: ${MQTT_USER}
      MQTT_PASS: ${MQTT_PASS}
      MQTT_CERT_PATH: ${MQTT_CERT_PATH}
      MQTT_KEY_PATH: ${MQTT_KEY_PATH}
    depends_on:
      psql:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- --no-check-certificate --certificate=/run/secrets/go_crt --private-key=/run/secrets/go_key https://localhost:8443/api/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

  watch:
    secrets:
      - go_crt
      - go_key
      - backend_ca
    profiles: ["dev"]
    expose:
      - "8443"
    ports:
      - "8883:8883"
    build:
      context: .
      dockerfile: Dockerfile
      target: watch
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV}
      PORT: ${PORT}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE}
      POSTGRES_USERNAME: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_SCHEMA: ${POSTGRES_SCHEMA}
      TLS_PORT: ${TLS_PORT}
      MQTT_USER: ${MQTT_USER}
      MQTT_PASS: ${MQTT_PASS}
    volumes:
      - .:/app
      - air_tmp:/app/tmp
      - frontend_node_modules:/app/frontend/node_modules
    depends_on:
      psql:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- --no-check-certificate --certificate=/run/secrets/go_crt --private-key=/run/secrets/go_key https://localhost:8443/api/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"

  psql:
    profiles: ["prod", "dev"]
    image: postgres:${POSTGRES_VERSION}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE}
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-local=scram-sha-256 --auth-host=scram-sha-256"
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - psql_volume:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'pg_isready -U ${POSTGRES_USERNAME} -d ${POSTGRES_DATABASE}'"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

volumes:
  psql_volume:
  frontend_node_modules:
  air_tmp:

networks:
  app-network: