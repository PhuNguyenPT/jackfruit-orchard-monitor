name: Firmware CI
on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]
jobs:
  firmware-validation:
    runs-on: ubuntu-latest
    container: debian:bookworm
    steps:
      - name: Install base tools
        run: |
          apt-get update
          apt-get install -y git curl ca-certificates sudo build-essential python3 python3-pip python3-venv

      - uses: actions/checkout@v6

      - name: Install clang-format-14
        run: |
          sudo apt-get install -y clang-format-14
          sudo ln -sf /usr/bin/clang-format-14 /usr/bin/clang-format

      - name: Clang-Format check
        run: |-
          find src include lib -name "*.cpp" -o -name "*.h" |
          xargs clang-format --dry-run --Werror

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: pio-${{ runner.os }}-debian-v1-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-debian-v1-

      - name: Install PlatformIO
        run: pip install --upgrade platformio --break-system-packages

      - name: Generate config headers
        run: |
          cp include/broker_config.example.h include/broker_config.h
          cp include/config.example.h include/config.h
          cp include/wifi.example.h include/wifi.h

      - name: Inject MQTT secrets
        env:
          MQTT_SERVER: ${{ secrets.MQTT_SERVER }}
          MQTT_USER: ${{ secrets.MQTT_USER }}
          MQTT_PASS: ${{ secrets.MQTT_PASS }}
        run: |
          sed -i "s|inline constexpr char MQTT_SERVER\[\] = \"\";|inline constexpr char MQTT_SERVER[] = \"${MQTT_SERVER}\";|" include/broker_config.h
          sed -i "s|inline constexpr char MQTT_USER\[\] = \"\";|inline constexpr char MQTT_USER[] = \"${MQTT_USER}\";|" include/broker_config.h
          sed -i "s|inline constexpr char MQTT_PASS\[\] = \"\";|inline constexpr char MQTT_PASS[] = \"${MQTT_PASS}\";|" include/broker_config.h

      - name: Native unit tests
        run: platformio test --environment native

      - name: Build (esp32dev)
        run: platformio run --environment esp32dev

      - name: Build (esp32prod)
        run: platformio run --environment esp32prod

      - name: Clang-Tidy (esp32dev)
        run: platformio check --environment esp32dev --fail-on-defect high

      - name: Clang-Tidy (esp32prod)
        run: platformio check --environment esp32prod --fail-on-defect high

      - name: Cppcheck (native)
        run: platformio check --environment native --fail-on-defect high