name: Firmware CI
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
jobs:
  firmware-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install clang-format-14
        run: |
          sudo apt-get install -y clang-format-14
          sudo ln -sf /usr/bin/clang-format-14 /usr/bin/clang-format

      - name: Clang-Format check
        run: |-
          find src include lib -name "*.cpp" -o -name "*.h" |
          xargs clang-format --dry-run --Werror

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: pio-${{ runner.os }}-v2-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-v2-

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Generate config headers
        run: |
          cp include/broker_config.example.h include/broker_config.h
          cp include/config.example.h include/config.h
          cp include/wifi.example.h include/wifi.h

      - name: Inject MQTT secrets
        env:
          MQTT_SERVER: ${{ secrets.MQTT_SERVER }}
          MQTT_USER: ${{ secrets.MQTT_USER }}
          MQTT_PASS: ${{ secrets.MQTT_PASS }}
        run: |
          sed -i "s|inline constexpr char MQTT_SERVER\[\] = \"\";|inline constexpr char MQTT_SERVER[] = \"${MQTT_SERVER}\";|" include/broker_config.h
          sed -i "s|inline constexpr char MQTT_USER\[\] = \"\";|inline constexpr char MQTT_USER[] = \"${MQTT_USER}\";|" include/broker_config.h
          sed -i "s|inline constexpr char MQTT_PASS\[\] = \"\";|inline constexpr char MQTT_PASS[] = \"${MQTT_PASS}\";|" include/broker_config.h

      - name: Native unit tests
        run: platformio test --environment native

      - name: Build
        run: platformio run --environment esp32dev

      - name: Debug clang-tidy version
        run: |
          cat ~/.platformio/packages/tool-clangtidy/package.json | grep -i version
          ~/.platformio/packages/tool-clangtidy/clang-tidy --version

      - name: Clang-Tidy (static analysis)
        run: >
          platformio check --environment esp32dev --fail-on-defect high

      - name: Cppcheck (native)
        run: >
          platformio check --environment native --fail-on-defect high