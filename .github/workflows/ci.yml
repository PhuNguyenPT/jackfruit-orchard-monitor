name: CI
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # 1. Run the format check immediately on your raw repository code
      - name: Clang-Format check
        run: |-
          find src include -name "*.cpp" -o -name "*.h" |
          xargs clang-format --dry-run --Werror

      # 2. Proceed with setting up dependencies and compilation
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-
      - name: Install PlatformIO
        run: pip install --upgrade platformio
      - name: Generate config headers
        run: |
          cp include/broker_config.example.h include/broker_config.h
          cp include/config.example.h include/config.h
      - name: Inject MQTT secrets
        env:
          MQTT_SERVER: ${{ secrets.MQTT_SERVER }}
          MQTT_USER: ${{ secrets.MQTT_USER }}
          MQTT_PASS: ${{ secrets.MQTT_PASS }}
        run: |
          sed -i "s|const char\* const MQTT_SERVER.*=.*\"\";|const char* const MQTT_SERVER = \"${MQTT_SERVER}\";|" include/broker_config.h
          sed -i "s|const char\* const MQTT_USER.*=.*\"\";|const char* const MQTT_USER   = \"${MQTT_USER}\";|" include/broker_config.h
          sed -i "s|const char\* const MQTT_PASS.*=.*\"\";|const char* const MQTT_PASS   = \"${MQTT_PASS}\";|" include/broker_config.h
      - name: Build
        run: platformio run --environment esp32dev
      - name: Clang-Tidy (static analysis)
        run: >
          platformio check --environment esp32dev --fail-on-defect high