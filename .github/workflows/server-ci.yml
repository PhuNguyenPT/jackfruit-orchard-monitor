name: Server CI/CD

on:
  push:
    branches: ["main", "dev"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]

jobs:
  # JOB 1: Code Verification (Runs on every Push and Pull Request)
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: npm ci --prefix ./frontend

      - name: Generate Source Files
        run: |
          make sqlc-generate
          make templ-generate

      - name: Vet & Lint
        run: |
          make vet
          make lint

      - name: Run Tests
        run: make all

  # JOB 2: Production Container Compilation (Only runs if Validate passes and it is a push/tag)
  publish-docker:
    needs: validate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU (For ARM64 cross-compilation)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/jackfruit-orchard-monitor-app
          tags: |
            # Tag with branch name (creates :dev and :main images)
            type=ref,event=branch
            # Tag with semantic versioning metrics when a git tag is pushed
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Assigns :latest tracking tag only to pushes on the main branch
            type=edge,branch=main

      - name: Build and Push Multi-Arch Production Image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: prod
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max